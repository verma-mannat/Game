<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Waves Prototype</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        
        canvas {
            border: 2px solid white;
            background: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- PLAYER CONFIGURATION ---
        const player = {
            x: 80,
            y: 200,
            size: 20,
            color: "#00ffcc",
            speed: 5
        };

        // --- OBSTACLE MANAGEMENT ---
        let obstacles = [];
        let obstacleTimer = 0;
        const obstacleSpawnRate = 90; 
        const obstacleSpeed = 4;

        // --- SCORE SYSTEM ---
        let currentScore = 0;
        // Check if a high score was saved before; if not, start at 0
        let highScore = localStorage.getItem("spaceWavesHighScore") ? parseInt(localStorage.getItem("spaceWavesHighScore")) : 0;
        let scoreTimer = 0; // Used to increment score over time

        // Track if the button/mouse is being pressed
        let isPressed = false;

        // --- INPUT LISTENERS ---
        window.addEventListener("mousedown", () => isPressed = true);
        window.addEventListener("mouseup", () => isPressed = false);
        window.addEventListener("touchstart", () => isPressed = true);
        window.addEventListener("touchend", () => isPressed = false);

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") isPressed = true;
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "Space") isPressed = false;
        });

        // --- RESET FUNCTION ---
        function resetGame() {
            // Check if current score beat the high score before resetting
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem("spaceWavesHighScore", highScore); // Save to browser memory!
            }

            player.y = 200;
            obstacles = [];
            obstacleTimer = 0;
            currentScore = 0; // Reset current score
            scoreTimer = 0;
            isPressed = false;
        }

        // --- UPDATE LOGIC ---
        function updateGame() {
            // 1. Move Player
            if (isPressed) {
                player.y -= player.speed;
            } else {
                player.y += player.speed;
            }

            // Boundaries
            if (player.y < player.size) player.y = player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

            // 2. Increment Score (Earn 1 point roughly every 10 frames (~0.16 seconds))
            scoreTimer++;
            if (scoreTimer >= 10) {
                currentScore++;
                scoreTimer = 0;
            }

            // 3. Handle Obstacles Spawning
            obstacleTimer++;
            if (obstacleTimer >= obstacleSpawnRate) {
                let minHeight = 40;
                let maxHeight = 200;
                let height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                let isTop = Math.random() < 0.5;
                let yPosition = isTop ? 0 : canvas.height - height;

                obstacles.push({
                    x: canvas.width,
                    y: yPosition,
                    width: 30,
                    height: height,
                    color: "#ff4444"
                });

                obstacleTimer = 0;
            }

            // 4. Move and Check Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= obstacleSpeed;

                // Check collision
                if (
                    player.x + player.size > obs.x &&
                    player.x < obs.x + obs.width &&
                    player.y + player.size / 2 > obs.y &&
                    player.y - player.size / 2 < obs.y + obs.height
                ) {
                    resetGame();
                    return; 
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }
        }

        // --- DRAW LOGIC ---
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size / 2);
            ctx.lineTo(player.x + player.size, player.y);
            ctx.lineTo(player.x, player.y + player.size / 2);
            ctx.closePath();
            ctx.fill();
        }

        function drawObstacles() {
            for (let obs of obstacles) {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
        }

        function drawScoreboard() {
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 18px sans-serif";
            
            // Draw current score on the top left
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + currentScore, 20, 30);
            
            // Draw high score on the top right
            ctx.textAlign = "right";
            ctx.fillText("HI-SCORE: " + highScore, canvas.width - 20, 30);
        }

        // --- GAME LOOP ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update data
            updateGame();

            // Render visual frames
            drawObstacles();
            drawPlayer();
            drawScoreboard(); // Draw the text over the top of the gameplay

            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>

</body>
</html>

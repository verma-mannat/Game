<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Waves Prototype</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        
        canvas {
            border: 2px solid white;
            background: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

        <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- PLAYER CONFIGURATION ---
        const player = {
            x: 80,
            y: 200,
            size: 20,
            color: "#00ffcc",
            speed: 5
        };

        // --- OBSTACLE CONFIGURATION ---
        const obstacle = {
            x: canvas.width,    // Start off-screen on the right
            width: 50,          // Width of the obstacles
            gap: 120,           // Size of the gap to fly through
            gapY: 150,          // Vertical position of the gap
            speed: 4,           // Speed moving left
            color: "#ff0055"    // Neon pink color
        };

        let isPressed = false;

        // --- INPUT LISTENERS ---
        window.addEventListener("mousedown", () => isPressed = true);
        window.addEventListener("mouseup", () => isPressed = false);
        window.addEventListener("touchstart", () => isPressed = true);
        window.addEventListener("touchend", () => isPressed = false);
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") isPressed = true;
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "Space") isPressed = false;
        });

        function updatePlayer() {
            if (isPressed) {
                player.y -= player.speed;
            } else {
                player.y += player.speed;
            }

            if (player.y < player.size) player.y = player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;
        }

        // --- UPDATE OBSTACLES ---
        function updateObstacles() {
            // Move obstacle to the left
            obstacle.x -= obstacle.speed;

            // If obstacle goes off-screen, reset it to the right with a new random gap position
            if (obstacle.x + obstacle.width < 0) {
                obstacle.x = canvas.width;
                // Random gap height, keeping it away from the extreme edges
                obstacle.gapY = Math.random() * (canvas.height - obstacle.gap - 100) + 50;
            }
        }

        // --- DRAW OBSTACLES ---
        function drawObstacles() {
            ctx.fillStyle = obstacle.color;

            // Top obstacle
            ctx.fillRect(obstacle.x, 0, obstacle.width, obstacle.gapY);

            // Bottom obstacle
            const bottomObstacleY = obstacle.gapY + obstacle.gap;
            const bottomObstacleHeight = canvas.height - bottomObstacleY;
            ctx.fillRect(obstacle.x, bottomObstacleY, obstacle.width, bottomObstacleHeight);
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size / 2);
            ctx.lineTo(player.x + player.size, player.y);
            ctx.lineTo(player.x, player.y + player.size / 2);
            ctx.closePath();
            ctx.fill();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update
            updatePlayer();
            updateObstacles();

            // Draw
            drawObstacles();
            drawPlayer();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Waves Prototype</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        
        canvas {
            border: 2px solid white;
            background: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

       <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- PLAYER CONFIGURATION ---
        const player = {
            x: 80,          // Position from the left
            y: 200,         // Start in the middle vertically
            size: 20,       // Size of the triangle
            color: "#00ffcc" // Neon cyan color
        };

        // Function to draw the player as a triangle pointing right
        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            // Top point of the triangle
            ctx.moveTo(player.x, player.y - player.size / 2);
            // Right point of the triangle
            ctx.lineTo(player.x + player.size, player.y);
            // Bottom point of the triangle
            ctx.lineTo(player.x, player.y + player.size / 2);
            ctx.closePath();
            ctx.fill();
        }

        function gameLoop() {
            // Clear the screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the player
            drawPlayer();

            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>

</body>
</html>

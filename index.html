<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Waves Prototype</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        
        canvas {
            border: 2px solid white;
            background: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- PLAYER CONFIGURATION ---
        const player = {
            x: 80,
            y: 200,
            size: 20,
            color: "#00ffcc",
            speed: 5 // How fast the player moves up/down
        };

        // Track if the button/mouse is being pressed
        let isPressed = false;

        // --- INPUT LISTENERS ---
        // Mouse/Touch controls
        window.addEventListener("mousedown", () => isPressed = true);
        window.addEventListener("mouseup", () => isPressed = false);
        window.addEventListener("touchstart", () => isPressed = true);
        window.addEventListener("touchend", () => isPressed = false);

        // Keyboard controls (Spacebar)
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") isPressed = true;
        });
        window.addEventListener("keyup", (e) => {
            if (e.code === "Space") isPressed = false;
        });

        function updatePlayer() {
            // If pressed, move UP. If not, move DOWN.
            if (isPressed) {
                player.y -= player.speed;
            } else {
                player.y += player.speed;
            }

            // Prevent player from leaving the screen (boundaries)
            if (player.y < player.size) {
                player.y = player.size;
            }
            if (player.y > canvas.height - player.size) {
                player.y = canvas.height - player.size;
            }
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size / 2);
            ctx.lineTo(player.x + player.size, player.y);
            ctx.lineTo(player.x, player.y + player.size / 2);
            ctx.closePath();
            ctx.fill();
        }

        function gameLoop() {
            // Clear the screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update positions
            updatePlayer();

            // Draw everything
            drawPlayer();

            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>

</body>
</html>
